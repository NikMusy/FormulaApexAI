name: Build & Release

# Автодеплой: при пуше тега вида v1.0.0 собирает .exe и публикует в Releases.
on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:        # можно запустить вручную из вкладки Actions

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --name FormulaApexAI --add-data "config.json;." app.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FormulaApexAI-exe
          path: dist/FormulaApexAI.exe

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} dist/FormulaApexAI.exe --title "${{ github.ref_name }}" --notes "Автосборка Formula Apex AI ${{ github.ref_name }}. Скачай FormulaApexAI.exe, запусти от администратора."
